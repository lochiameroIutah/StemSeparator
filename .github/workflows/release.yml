name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write

env:
  SCHEME: StemSeparator
  APP_NAME: "Stems Shortcut"
  PRODUCT_NAME: "Stems Shortcut"

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -scheme "$SCHEME" -project StemSeparator.xcodeproj

      - name: Build Release
        run: |
          xcodebuild build \
            -scheme "$SCHEME" \
            -project StemSeparator.xcodeproj \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            MARKETING_VERSION="${{ steps.version.outputs.VERSION }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.VERSION }}"

      - name: Create ZIP for Sparkle
        run: |
          APP_PATH="DerivedData/Build/Products/Release/${PRODUCT_NAME}.app"
          ditto -c -k --keepParent "$APP_PATH" "${PRODUCT_NAME}.zip"
          echo "ZIP_SIZE=$(stat -f%z "${PRODUCT_NAME}.zip")" >> $GITHUB_ENV

      - name: Generate Sparkle signature
        run: |
          # Download Sparkle's sign_update tool
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.6.0/Sparkle-2.6.0.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle && tar -xJ -C /tmp/sparkle -f /tmp/sparkle.tar.xz

          # Write the Ed25519 private key
          echo -n "${{ secrets.SPARKLE_PRIVATE_KEY }}" > /tmp/sparkle_ed_key

          # Sign the ZIP
          SIGNATURE=$(/tmp/sparkle/bin/sign_update "${PRODUCT_NAME}.zip" --ed-key-file /tmp/sparkle_ed_key | grep "sparkle:edSignature" | sed 's/.*"\(.*\)".*/\1/')
          echo "SPARKLE_SIG=${SIGNATURE}" >> $GITHUB_ENV
          rm /tmp/sparkle_ed_key

      - name: Generate appcast.xml
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${GITHUB_REF_NAME}"
          DATE=$(date -R)
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${PRODUCT_NAME// /%20}.zip"

          cat > appcast.xml << XMLEOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Stems Shortcut Updates</title>
              <link>https://${{ github.repository_owner }}.github.io/StemSeparator/appcast.xml</link>
              <description>Updates for Stems Shortcut</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${DATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  length="${ZIP_SIZE}"
                  type="application/octet-stream"
                  sparkle:edSignature="${SPARKLE_SIG}"
                />
              </item>
            </channel>
          </rss>
          XMLEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Stems Shortcut v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Stems Shortcut v${{ steps.version.outputs.VERSION }}

            Auto-update via Sparkle. Gli utenti esistenti riceveranno l'aggiornamento automaticamente.
          files: |
            ${{ env.PRODUCT_NAME }}.zip
          draft: false
          prerelease: false

      - name: Deploy appcast to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or switch to gh-pages branch
          git fetch origin gh-pages || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Clean and add appcast
          git rm -rf . 2>/dev/null || true
          cp appcast.xml .
          echo "<html><body><h1>Stems Shortcut Updates</h1><p><a href='appcast.xml'>appcast.xml</a></p></body></html>" > index.html

          git add appcast.xml index.html
          git commit -m "Update appcast for v${{ steps.version.outputs.VERSION }}"
          git push origin gh-pages --force
